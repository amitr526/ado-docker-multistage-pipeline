trigger:
  branches:
    include:
      - main
  tags:
    include:
      - 'v*'
      - '*.*.*'

pr:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
- name: NOTIFY_USERS
  value: 'foo@bar,baz@qux'
- name: IMAGE_REGISTRY_CONNECTION
  value: 'ACR Demo'
- name: IMAGE_REGISTRY
  value: 'ADODemo'
- name: IMAGE_REPOSITORY
  value: 'adodemo'
- name: REGISTRY_URL
  value: 'adodemo.azurecr.io'
- name: ReleaseTag
  value: ''
- name: SourceTag
  value: $[startsWith(variables['Build.SourceBranch'], 'refs/tags/') ? replace(variables['Build.SourceBranch'], 'refs/tags/', '') : '']
- name: TAG
  value: $[coalesce(variables['ReleaseTag'], variables['SourceTag'], variables['Build.BuildId'])]
- name: AZURE_SUBSCRIPTION
  value: 'Azure'
- name: DEV_WEBAPP_NAME
  value: 'ADODemo-Dev'
- name: PROD_WEBAPP_NAME
  value: 'ADODemo-Prod'
- name: PROD_SERVER_IP
  value: '1.2.3.4'
- name: PROD_SSH_KEY_FILE
  value: 'adodemo-key.pem'
- name: PROD_SSH_USER
  value: 'ubuntu'
- name: ACR_USERNAME
  value: ''
- name: ACR_PASSWORD
  value: ''
- name: CONTAINER_PORT
  value: '8080'

stages:
- stage: BuildApp
  displayName: 'Build Application'
  jobs:
  - job: BuildPushImage
    displayName: 'Build and Push Docker Image'
    steps:
    - task: Docker@2
      inputs:
        containerRegistry: '$(IMAGE_REGISTRY_CONNECTION)'
        repository: '$(IMAGE_REPOSITORY)'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(TAG)
          latest

- stage: Test
  displayName: 'Test Application'
  dependsOn: BuildApp
  condition: succeeded()
  jobs:
  - job: RunTests
    displayName: 'Run Tests'
    steps:
    - script: |
        echo "Pulling image for testing"
        docker pull $(REGISTRY_URL)/$(IMAGE_REPOSITORY):$(TAG)
        echo "Running container for smoke test"
        docker run --rm $(REGISTRY_URL)/$(IMAGE_REPOSITORY):$(TAG) echo "Container runs successfully"
      displayName: 'Smoke Test Container'

- stage: DeployDev
  displayName: 'Deploy to Development'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - deployment: DeployDev
    displayName: 'Deploy to Dev Environment'
    environment: 'development'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureRmWebAppDeployment@4
            inputs:
              ConnectionType: 'AzureRM'
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              appType: 'webAppContainer'
              WebAppName: '$(DEV_WEBAPP_NAME)'
              DockerNamespace: '$(IMAGE_REGISTRY)'
              DockerRepository: '$(IMAGE_REPOSITORY)'
              DockerImageTag: '$(TAG)'

- stage: DeployProdAzure
  displayName: 'Deploy to Azure Production'
  dependsOn: DeployDev
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - job: ApproveRelease
    displayName: 'Manual Approval for Azure Production'
    timeoutInMinutes: 4320 # job times out in 3 days
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 1440 # task times out in 1 day
      inputs:
        notifyUsers: '$(NOTIFY_USERS)'
        instructions: 'Approve the release to Azure production'
  - deployment: DeployProd
    displayName: 'Deploy to Azure Production'
    dependsOn: ApproveRelease
    environment: 'production-azure'
    condition: succeeded()
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureRmWebAppDeployment@4
            inputs:
              ConnectionType: 'AzureRM'
              azureSubscription: '$(AZURE_SUBSCRIPTION)'
              appType: 'webAppContainer'
              WebAppName: '$(PROD_WEBAPP_NAME)'
              DockerNamespace: '$(IMAGE_REGISTRY)'
              DockerRepository: '$(IMAGE_REPOSITORY)'
              DockerImageTag: '$(TAG)'

- stage: DeployProdServer
  displayName: 'Deploy to Production Server'
  dependsOn: DeployDev
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - job: ApproveRelease
    displayName: 'Manual Approval for Production Deployment'
    timeoutInMinutes: 4320 # job times out in 3 days
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 1440 # task times out in 1 day
      inputs:
        notifyUsers: '$(NOTIFY_USERS)'
        instructions: 'Approve the release to production server'
  - job: DeployProd
    displayName: 'Deploy to Production Server'
    dependsOn: ApproveRelease
    condition: succeeded()
    steps:
    - task: DownloadSecureFile@1
      name: sshKey
      inputs:
        secureFile: '$(PROD_SSH_KEY_FILE)'
    - script: |
        sudo chmod 400 $(sshKey.secureFilePath)
        ssh -o StrictHostKeyChecking=no -i $(sshKey.secureFilePath) $(PROD_SSH_USER)@$(PROD_SERVER_IP) "
          echo 'Logging in to ACR'
          printf '%s' "$(ACR_PASSWORD)" | docker login $(REGISTRY_URL) -u "$(ACR_USERNAME)" --password-stdin
          echo 'Pulling image from ACR'
          docker pull $(REGISTRY_URL)/$(IMAGE_REPOSITORY):$(TAG)
          echo 'Stopping existing containers for this image'
          docker ps -q --filter ancestor=$(REGISTRY_URL)/$(IMAGE_REPOSITORY):$(TAG) | xargs -r docker stop | xargs -r docker rm
          echo 'Running new container'
          docker run -d -p $(CONTAINER_PORT):80 $(REGISTRY_URL)/$(IMAGE_REPOSITORY):$(TAG)
          echo 'Waiting for container to start'
          sleep 10
          echo 'Checking health'
          curl -f http://localhost:$(CONTAINER_PORT) || echo 'Health check failed, but continuing'
        "
      displayName: 'Deploy to Production Server'
